# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: dotnet

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-15, ubuntu-22.04, ubuntu-24.04, windows-2022, windows-2025 ]
        arch: [x64, arm64]
        exclude:
          - os: windows-2022
            arch: arm64
          - os: windows-2025
            arch: arm64
          - os: ubuntu-22.04
            arch: arm64
          - os: ubuntu-24.04
            arch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Setup dotnet (${{ matrix.arch }}, ${{ matrix.os }})
        if: contains(matrix.os, 'ubuntu')
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0
          architecture: ${{ matrix.arch }}
          workloads: maui, android, maui-android, net10.0-android
      
      - name: Setup dotnet (${{ matrix.arch }}, ${{ matrix.os }})
        if: contains(matrix.os, 'macos')
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0
          architecture: ${{ matrix.arch }}
          workloads: maui, android, maui-android, net10.0-android, net10.0-ios, net10.0-maccatalyst, maui-ios, maui-maccatalyst
      
      - name: Setup dotnet (${{ matrix.arch }}, ${{ matrix.os }})
        if: contains(matrix.os, 'windows')
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0
          architecture: ${{ matrix.arch }}
          workloads: maui, android, maui-android, net10.0-android, net10.0-ios, net10.0-maccatalyst, maui-ios, maui-maccatalyst, net10.0-windows10.0.19041.0
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore
      
      - name: Test
        run: dotnet test --no-build --verbosity normal
