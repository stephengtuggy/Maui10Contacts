# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: dotnet

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
          - os: macos-15-intel
            arch: x64
          - os: ubuntu-22.04
            arch: x64
          - os: ubuntu-24.04
            arch: x64
          - os: windows-2022
            arch: x64
          - os: windows-2025
            arch: x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Set up dotnet (${{ matrix.arch }}, Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0
          architecture: ${{ matrix.arch }}
          workloads: maui-android
      
      - name: Setup dotnet (${{ matrix.arch }}, macOS)
        if: contains(matrix.os, 'macos')
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0
          architecture: ${{ matrix.arch }}
          workloads: maui-android, maui-ios, maui-maccatalyst
      
      - name: Setup dotnet (${{ matrix.arch }}, Windows)
        if: contains(matrix.os, 'windows')
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0
          architecture: ${{ matrix.arch }}
          workloads: maui-android, maui-ios, maui-maccatalyst, maui-windows
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore
      
      - name: Test
        run: dotnet test --no-build --verbosity normal
